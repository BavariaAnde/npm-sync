# Example advanced_config snippet
# Add a custom header and simple rate limiting
limit_req_zone $binary_remote_addr zone=example_zone:10m rate=5r/s;

add_header X-Example-Config "enabled";

location / {
  limit_req zone=example_zone burst=10 nodelay;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Forwarded-Host $host;
}
