# Example inventory for npm-sync
# Copy to config/hosts.yml and adjust for your environment.

defaults:
  scheme: http
  access_list: lan
  certificate_strategy: wildcard
  certificate_name: "*.example.com"
  block_common_exploits: true
  websocket_support: true
  caching_enabled: false
  http2_support: true
  hsts_enabled: false
  force_ssl: true

hosts:
  - domain: immich.example.com
    forward_host: immich
    forward_port: 2283
    description: Immich on same Docker network

  - domain: paperless.example.com
    forward_host: 192.168.1.10
    forward_port: 8000
    description: Paperless on another host

  - domain: dev.service.example.com
    forward_host: dev-service
    forward_port: 3000
    description: Nested subdomain example
    advanced_config: |
      # add custom Nginx directives here
      client_max_body_size 100m;

  - domain: disabled.example.com
    forward_host: 192.168.1.50
    forward_port: 9000
    description: Example disabled entry
    enabled: false
