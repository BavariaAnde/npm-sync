NPM_URL=https://npm.andreas-goettl.de
NPM_IDENTITY=your-npm-email@example.com
NPM_SECRET=your-npm-password

# Optional: if you use an API token flow later, keep these empty for now.
NPM_ACCESS_TOKEN=

# Defaults for your setup
BASE_DOMAIN=andreas-goettl.de
DEFAULT_ACCESS_LIST_ID=1
DEFAULT_CERTIFICATE_ID=1
DEFAULT_SSL_FORCED=true
DEFAULT_HTTP2=true
DEFAULT_HSTS=true
DEFAULT_HSTS_SUBDOMAINS=false
DEFAULT_BLOCK_EXPLOITS=true
DEFAULT_WEBSOCKETS=true
DEFAULT_CACHE_ASSETS=false
DEFAULT_ENABLED=true
DEFAULT_ALLOW_PUBLICALLY=false

# When true, existing hosts are updated to match YAML.
UPDATE_EXISTING=true
VERIFY_SSL=true
REQUEST_TIMEOUT=30
